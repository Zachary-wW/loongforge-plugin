family: <family>
model_category: <model_category_label>   # Uppercase, e.g. LLM

hf_reference:
  path: <hf_path>
  model_type: <read model_type field from hf_path/config.json>

structural_tags:
  has_mla: <true|false|null>          # null -> # TODO: requires manual confirmation
  has_moe: <true|false>
  has_qk_layernorm: <true|false>
  has_linear_attn: <true|false>
  has_mtp: <true|false>
  is_mha: <true|false>
  vocab_size_tier: "<small|standard|large>"

code_paths:
  config: <path or # Phase 1 not complete, to be supplemented>
  layer_spec: <path>
  model: <path>
  init: <path>
  # Additional custom modules are appended by Step 1d fallback rules.

megatron_code_paths:
  # Paths to Megatron-side files generated or modified during adaptation.
  # Only populated when Phase 1 generated Megatron files.
  <field>: <megatron_path or # Phase 1 not complete, to be supplemented>
  # Example:
  # experimental_attention_variant_dsa: megatron/core/transformer/experimental_attention_variant/dsa.py

traps:
  - field: <field1>
    detail: >
      <detail1>
  # If traps is empty, write: []

omni_reference:
  model_yaml: <path or # Phase 2 not complete, to be supplemented>
  convert_yaml: <path>  # If dense+moe each have one, use convert_yaml_dense/convert_yaml_moe.
  example_script: <path>
