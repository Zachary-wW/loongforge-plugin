  model_type: <read model_type field from hf_path/config.json>

structural_tags:
  has_mla: <true|false|null>
  has_moe: <true|false>
  has_qk_layernorm: <true|false>
  has_linear_attn: <true|false>
  has_mtp: <true|false>
  is_mha: <true|false>
  vocab_size_tier: "<small|standard|large|null>"

code_paths:
  config: <path or # Phase 1 not complete, to be supplemented>
  layer_spec: <path>
  model: <path>
  init: <path>

traps:
