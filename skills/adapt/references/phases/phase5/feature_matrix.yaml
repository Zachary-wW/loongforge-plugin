# Fixed Phase 4 feature compatibility matrix.
# Phase 4 must read this file, evaluate every row, and record each row as
# passed, skipped, human_needed, or human_confirm. Do not invent additional rows
# during execution.

version: 1
rows:
  - category: parallel_strategy
    switch: TP
    source: phase5_builtin
    applies_to: [llm, vlm, moe, dense]
    activation_type: script_args
    parameters_to_add: ["--tensor-model-parallel-size 2"]
    yaml_overrides:
      tensor_model_parallel_size: 2
    env_to_set: {}
    dependencies: []
    mutually_exclusive: []
    skip_rule: "Requires at least 2 visible devices or k8s slots; if baseline already has TP > 1, test the next feasible value."
    verification: "Phase 3 loss-diff"

  - category: parallel_strategy
    switch: EP
    source: phase5_builtin
    applies_to: [moe]
    activation_type: script_args
    parameters_to_add:
      - "--expert-model-parallel-size 2"
      - "--expert-tensor-parallel-size 1 when the baseline MoE script requires ETP to be explicit"
    yaml_overrides:
      expert_model_parallel_size: 2
      expert_tensor_parallel_size: 1
    env_to_set: {}
    dependencies: []
    mutually_exclusive: []
    skip_rule: "Skip for non-MoE models."
    verification: "Phase 3 loss-diff"

  - category: parallel_strategy
    switch: PP
    source: phase5_builtin
    applies_to: [llm, vlm, moe, dense]
    activation_type: script_args
    parameters_to_add: ["--pipeline-model-parallel-size 2"]
    yaml_overrides:
      pipeline_model_parallel_size: 2
    env_to_set: {}
    dependencies: []
    mutually_exclusive: []
    skip_rule: "Requires at least 2 visible devices and enough layers for non-empty PP stages."
    verification: "Phase 3 loss-diff"

  - category: parallel_strategy
    switch: VPP
    source: phase5_builtin
    applies_to: [llm, vlm, moe, dense]
    activation_type: script_args
    parameters_to_add:
      - "--pipeline-model-parallel-size 2"
      - "--num-virtual-stages-per-pipeline-rank 2"
      - "--pipeline-model-parallel-layout <layout> when uneven PP layout is required"
    yaml_overrides:
      pipeline_model_parallel_size: 2
      num_virtual_stages_per_pipeline_rank: 2
      pipeline_model_parallel_layout: "<layout optional>"
    env_to_set: {}
    dependencies: []
    mutually_exclusive: []
    skip_rule: "Requires valid PP first; skip when layer count cannot form valid virtual stages."
    verification: "Phase 3 loss-diff"

  - category: data_capability
    switch: SFT Packing
    source: phase5_builtin
    applies_to: [llm, vlm]
    activation_type: script_args
    parameters_to_add:
      - "--training-phase sft"
      - "--packing-sft-data"
      - "--packing-buffer-size 10000"
      - "--sft-sort-batch when baseline uses sorted SFT batches"
    yaml_overrides:
      training_phase: sft
      packing_sft_data: true
      packing_buffer_size: 10000
      sft_sort_batch: "<optional true>"
    env_to_set: {}
    dependencies: []
    mutually_exclusive: []
    skip_rule: "Requires SFT data config and tokenizer/chat template; skip when SFT is out of scope."
    verification: "Phase 3 loss-diff using SFT mock/fixture"

  - category: feature
    switch: FP8 blockwise training
    source: docs/source/features/fp8_training.md
    applies_to: [llm, vlm, moe, dense]
    activation_type: script_args+script_env
    parameters_to_add:
      - "--fp8-format e4m3"
      - "--fp8-recipe blockwise"
      - "--fp8-param-gather after baseline FP8 passes"
    yaml_overrides:
      fp8: e4m3
      fp8_recipe: blockwise
      fp8_param: "<optional true>"
    env_to_set:
      FP8_QUANT_FWD_INP_AMAX_EPS: "1e-12"
      FP8_QUANT_FWD_WEIGHT_AMAX_EPS: "1e-12"
      FP8_QUANT_BWD_GRAD_AMAX_EPS: "1e-12"
    dependencies: []
    mutually_exclusive: []
    skip_rule: "Requires native FP8 hardware and TransformerEngine."
    verification: "Phase 3 loss-diff"

  - category: feature
    switch: VLM component FP8
    source: docs/source/features/fp8_training_for_vlm.md
    applies_to: [vlm, vision_encoder]
    activation_type: script_args+copied_yaml
    parameters_to_add:
      - "--fp8-format e4m3"
      - "--fp8-recipe blockwise"
      - "--fp8-param-gather optional"
    yaml_overrides:
      model.foundation.fp8: e4m3
      model.foundation.fp8_recipe: blockwise
      model.foundation.fp8_param: true
      model.image_encoder.fp8: e4m3
      model.image_encoder.fp8_recipe: blockwise
      model.image_encoder.fp8_param: true
    env_to_set:
      FP8_QUANT_FWD_INP_AMAX_EPS: "1e-12"
      FP8_QUANT_FWD_WEIGHT_AMAX_EPS: "1e-12"
      FP8_QUANT_BWD_GRAD_AMAX_EPS: "1e-12"
    dependencies: []
    mutually_exclusive: []
    skip_rule: "Skip for LLM-only models."
    verification: "Phase 3 loss-diff with visual mock input"

  - category: feature
    switch: Adaptive / Selective FP8
    source: docs/source/features/adaptive_fp8.md
    applies_to: [llm, vlm, moe, dense]
    activation_type: script_args+copied_yaml
    parameters_to_add:
      - "--fp8-format e4m3"
      - "--fp8-recipe blockwise"
      - "--fp8-param-gather optional"
    yaml_overrides:
      fp8: e4m3
      fp8_recipe: blockwise
      fp8_param: true
      selective_fp8: true
      fp8_dynamic_policy_path: "<policy.json>"
    env_to_set:
      FP8_QUANT_FWD_INP_AMAX_EPS: "1e-12"
      FP8_QUANT_FWD_WEIGHT_AMAX_EPS: "1e-12"
      FP8_QUANT_BWD_GRAD_AMAX_EPS: "1e-12"
    dependencies: []
    mutually_exclusive: []
    skip_rule: "Requires existing policy JSON; if absent, human_needed with suggested benchmark command, do not benchmark inside Phase 4."
    verification: "Phase 3 loss-diff when policy exists"

  - category: feature
    switch: Fused Linear Cross Entropy
    source: docs/source/features/fused_linear_cross_entropy.md
    applies_to: [llm, vlm, language_model]
    activation_type: script_args+script_env
    parameters_to_add:
      - "--cross-entropy-loss-fusion"
      - "--cross-entropy-fusion-impl linear"
    yaml_overrides:
      cross_entropy_loss_fusion: true
      cross_entropy_fusion_impl: linear
    env_to_set:
      LCE_GENERIC_FWD_VOCAB_SPLIT_SIZE: "3072 optional"
      LCE_GENERIC_BWD_VOCAB_SPLIT_SIZE: "3072 optional"
    dependencies: []
    mutually_exclusive: []
    skip_rule: "Requires LM head + CE loss path; skip for diffusion and encoder-only models."
    verification: "Phase 3 loss-diff"

  - category: feature
    switch: MoE 1F1B A2A overlap
    source: docs/source/features/moe_all2all_overlap.md
    applies_to: [moe]
    activation_type: script_args+script_env
    parameters_to_add:
      - "--overlap-moe-expert-parallel-comm"
      - "--delay-wgrad-compute"
    yaml_overrides:
      overlap_moe_expert_parallel_comm: true
      delay_wgrad_compute: true
    env_to_set:
      CUDA_DEVICE_MAX_CONNECTIONS: "32"
    dependencies: [EP, VPP]
    mutually_exclusive: []
    skip_rule: "Requires MoE + EP and interleaved 1F1B schedule; skip for dense models."
    verification: "Phase 3 loss-diff after EP/VPP prerequisites"

  - category: feature
    switch: MoE selective recompute + activation offload
    source: docs/source/features/moe_all2all_overlap.md
    applies_to: [moe]
    activation_type: script_args
    parameters_to_add:
      - "--recompute-granularity selective"
      - "--recompute-modules a2a_overlap_attn a2a_overlap_post_attn a2a_overlap_mlp"
      - "--fine-grained-activation-offloading"
      - "--offload-tensors dispatched_input pre_mlp_layernorm_output"
      - "--bindpcie optional"
    yaml_overrides:
      recompute_granularity: selective
      recompute_modules: [a2a_overlap_attn, a2a_overlap_post_attn, a2a_overlap_mlp]
      fine_grained_activation_offloading: true
      offload_tensors: [dispatched_input, pre_mlp_layernorm_output]
    env_to_set: {}
    dependencies: ["MoE 1F1B A2A overlap"]
    mutually_exclusive: []
    skip_rule: "Requires MoE A2A overlap path; skip for dense models."
    verification: "Phase 3 loss-diff after A2A overlap passes"

  - category: feature
    switch: VLM DP Load-Balancing
    source: docs/source/features/data_parallel_balancing.md
    applies_to: [vlm]
    activation_type: script_args
    parameters_to_add:
      - "--use-vlm-dp-balance"
      - "--dp-balance-verbose optional"
      - "--vlm-dp-balance-warmup-iters <iters> optional"
      - "--dp-balance-max-len-ratio-vlm 1.2 optional"
      - "--dp-balance-trigger-threshold-vlm 0.2 optional"
    yaml_overrides:
      use_vlm_dp_balance: true
      vlm_dp_balance_warmup_iters: "<optional>"
      dp_balance_max_len_ratio_vlm: 1.2
      dp_balance_trigger_threshold_vlm: 0.2
    env_to_set: {}
    dependencies: []
    mutually_exclusive: []
    skip_rule: "Requires VLM or InternVL packed variable-length batches; skip for LLM-only; human_needed if Phase 3 mock cannot exercise variable-length VLM batches."
    verification: "Short multi-iteration compatibility run"

  - category: feature
    switch: ViT Encoder DP Load-Balancing
    source: docs/source/features/vit_data_parallel_balancing.md
    applies_to: [vlm, vision_encoder]
    activation_type: script_args
    parameters_to_add:
      - "--use-vit-dp-balance"
      - "--dp-balance-max-len-ratio-vit <ratio> optional"
      - "--dp-balance-trigger-threshold-vit 0.2 optional"
      - "--dp-balance-verbose optional"
    yaml_overrides:
      use_vit_dp_balance: true
      dp_balance_max_len_ratio_vit: "<optional>"
      dp_balance_trigger_threshold_vit: 0.2
    env_to_set: {}
    dependencies: []
    mutually_exclusive: []
    skip_rule: "Requires OmniEncoderModel and image_grid_thw; skip for LLM-only or non-ViT VLM."
    verification: "VLM compatibility run with visual mock input"

  - category: feature
    switch: Heterogeneous encoder TP
    source: docs/source/features/heterogeneous_parallel.md
    applies_to: [vlm, vision_encoder]
    activation_type: script_args+copied_yaml
    parameters_to_add:
      - "Keep decoder --tensor-model-parallel-size <decoder_tp>; do not add a separate CLI flag unless baseline already uses one"
    yaml_overrides:
      model.image_encoder.tensor_model_parallel_size: 2
    env_to_set: {}
    dependencies: []
    mutually_exclusive: []
    skip_rule: "Requires VLM encoder-decoder model and enough GPUs; skip for LLM-only."
    verification: "Phase 3 loss-diff with copied VLM config"

  - category: feature
    switch: Encoder heterogeneous DP
    source: docs/source/features/heterogeneous_parallel.md
    applies_to: [vlm, vision_encoder]
    activation_type: script_args+copied_yaml
    parameters_to_add: ["--enable-encoder-hetero-dp"]
    yaml_overrides:
      model.image_encoder.tensor_model_parallel_size: 1
    env_to_set: {}
    dependencies: []
    mutually_exclusive: []
    skip_rule: "Requires VLM; docs require encoder TP 1; skip for LLM-only."
    verification: "Phase 3 loss-diff with visual mock input"

  - category: feature
    switch: Full heterogeneous DP
    source: docs/source/features/heterogeneous_parallel.md
    applies_to: [vlm, vision_encoder]
    activation_type: script_args+copied_yaml
    parameters_to_add:
      - "--enable-full-hetero-dp"
      - "--micro-batch-size 1 when baseline differs"
      - "--context-parallel-size 1 when baseline differs"
    yaml_overrides:
      model.image_encoder.tensor_model_parallel_size: 1
      recompute_granularity: full
      recompute_method: uniform
      recompute_num_layers: 1
    env_to_set: {}
    dependencies: []
    mutually_exclusive: []
    skip_rule: "Requires VLM; skip unless visual mock supports micro-batch-size 1 and CP=1."
    verification: "Phase 3 loss-diff or human_needed with missing fixture"

  - category: feature
    switch: Optimizer CPU offload
    source: docs/source/features/optimizer_support.md
    applies_to: [llm, vlm, moe, dense]
    activation_type: script_args+script_env
    parameters_to_add:
      - "--use-precision-aware-optimizer"
      - "--optimizer-cpu-offload"
      - "--optimizer-offload-fraction 1.0"
    yaml_overrides:
      use_precision_aware_optimizer: true
      optimizer_cpu_offload: true
      optimizer_offload_fraction: 1.0
    env_to_set:
      OMP_NUM_THREADS: "8"
      USE_BF16_BUFFER: "false optional fallback only when testing original TE path"
    dependencies: []
    mutually_exclusive: []
    skip_rule: "Requires optimizer step verification."
    verification: "One-step forward+backward+optimizer compatibility"

  - category: feature
    switch: Low-precision optimizer states
    source: docs/source/features/optimizer_support.md
    applies_to: [llm, vlm, moe, dense]
    activation_type: script_args
    parameters_to_add:
      - "--use-precision-aware-optimizer"
      - "--exp-avg-dtype bf16"
      - "--exp-avg-sq-dtype bf16"
    yaml_overrides:
      use_precision_aware_optimizer: true
      exp_avg_dtype: bf16
      exp_avg_sq_dtype: bf16
    env_to_set:
      USE_BF16_BUFFER: "false optional fallback comparison"
    dependencies: []
    mutually_exclusive: []
    skip_rule: "Requires optimizer step verification."
    verification: "One-step optimizer update + backward metrics"

  - category: feature
    switch: Offline VLM packing pipeline
    source: docs/source/features/offline_data_packing.md
    applies_to: [vlm]
    activation_type: not_phase5_runtime
    parameters_to_add: []
    yaml_overrides:
      data.wds_dir: "<config>"
      data.template_text_key: "<config>"
      data.packed_json_dir: "<config>"
      data.packed_wds_dir: "<config>"
      sample.max_token_len: "<config>"
      sample.sample_type: "<config>"
      model.model_type: "<config>"
      model.processor_kwargs: "<config>"
    env_to_set: {}
    tool_commands:
      - "python get_sample_len.py --config <config>"
      - "python do_hashbacket.py --config <config>"
      - "python prepare_raw_samples.py --config <config>"
      - "python packed_to_wds.py --config <config>"
    dependencies: []
    mutually_exclusive: []
    skip_rule: "Offline preprocessing feature; skip for LLM-only."
    verification: "human_confirm unless packed WDS fixture exists"

  - category: feature
    switch: MCore Bridge online HF loading/saving
    source: docs/source/features/mcore_bridge.md
    applies_to: [llm, vlm, moe, dense]
    activation_type: not_phase5_runtime
    parameters_to_add: []
    yaml_overrides: {}
    env_to_set: {}
    bridge_flow:
      load: "--load <hf_dir>"
      save: "--save <mcore_dir> --save-interval <N>"
      optional_save_hf: "--save-hf true --save-hf-path <path>"
    dependencies: []
    mutually_exclusive: []
    skip_rule: "Requires MEGATRON_PATH, LOONGFORGE_PATH, HF checkpoint directory. Overlaps Phase 2/3 checkpoint conversion; not a Phase 4 script toggle."
    verification: "human_confirm or separate bridge roundtrip"

  - category: feature
    switch: Model Combination / config-driven assembly
    source: docs/source/features/model_combination.md
    applies_to: [vlm]
    activation_type: not_phase5_runtime
    parameters_to_add: []
    yaml_overrides:
      defaults: "VLM YAML defaults selecting model.image_encoder, model.image_projector, model.foundation"
    env_to_set: {}
    dependencies: []
    mutually_exclusive: []
    skip_rule: "Architecture composition already validated by Phase 1/3 for adapted model."
    verification: "skipped with evidence from Phase 1 generated YAML and Phase 3 baseline script"
