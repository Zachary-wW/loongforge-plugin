family: deepseek_v4_flash
model_category: LLM

hf_reference:
  path: /ssd3/weizhihao/ckpt/DeepSeek-V4-Flash-Base
  model_type: deepseek_v4
  modeling_path: /ssd3/weizhihao/code/v4_0526/transformers/src/transformers/models/deepseek_v4/modeling_deepseek_v4.py

structural_tags:
  has_mla: true
  has_moe: true
  has_qk_layernorm: true
  has_linear_attn: false
  has_mtp: true
  is_mha: false
  vocab_size_tier: standard
  shared_kv_mqa: true
  compressed_attention: true
  hash_routing: true
  hyper_connections: true
  grouped_output_projection: true
  fp8_checkpoint: true

# Authoritative target layout actually used by v4_0520 / v4_0615 LoongForge.
code_paths:
  config: loongforge/models/foundation/deepseek_v4/deepseek_v4_config.py
  layer_spec: loongforge/models/foundation/deepseek_v4/deepseek_v4_layer_spec.py
  model: loongforge/models/foundation/deepseek_v4/deepseek_v4_model.py
  init: loongforge/models/foundation/deepseek_v4/__init__.py
  csa: loongforge/models/foundation/deepseek_v4/deepseek_v4_csa.py
  attention: loongforge/models/foundation/deepseek_v4/deepseek_v4_attention.py

omni_reference:
  model_yaml: configs/models/deepseek4/deepseek_v4_flash_base.yaml
  model_yaml_lite_4l: configs/models/deepseek4/deepseek_v4_flash_base_lite_4l_mtp1.yaml
  convert_yaml: configs/models/deepseek4/ckpt_convert/deepseek_v4_convert.yaml
  baseline_script: examples/deepseek_v4/sft_v4.sh
  pretrain_script: examples/deepseek_v4/pretrain/pretrain_deepseek_v4_fp8.sh
  finetune_script: examples/deepseek_v4/finetune/finetune_deepseek_v4_fp8.sh
  convert_hf_to_mcore_script: examples/deepseek_v4/checkpoint_convert/convert_deepseek_v4_hf_to_mcore_fp8.sh
  convert_mcore_to_hf_script: examples/deepseek_v4/checkpoint_convert/convert_deepseek_v4_mcore_to_hf.sh

# DeepSeek-V4 must be migrated from a known reference checkout, not generated
# from HF analysis only. The plugin's `adapt` skill must enable migration mode
# and gate Phase 1/2/3 on the deepseek-v4-migration verifier
# (skills/adapt/scripts/verify_deepseek_v4_migration.py).
migration:
  required: true
  reference_root: /ssd3/weizhihao/code/v4_0520
  reference_omni_path: /ssd3/weizhihao/code/v4_0520/AIAK-Training-Omni
  reference_megatron_path: /ssd3/weizhihao/code/v4_0520/AIAK-Megatron
  baseline_script: /ssd3/weizhihao/code/v4_0520/sft_v4.sh
  lossdiff_bundle: /ssd3/weizhihao/code/v4_0520/lossdiff_portable_bundle/lossdiff/src
  lite_checkpoint: /ssd3/weizhihao/ckpt/DeepSeek-V4-Flash-Base-lite-lay4L-mtp1
  forbidden_megatron_files:
    - megatron/core/transformer/experimental_attention_variant/csa.py
    - megatron/core/transformer/experimental_attention_variant/deepseek_v4_hybrid_attention.py
  forbidden_megatron_strings:
    - dsv4_hybrid
    - DeepseekV4
    - deepseek_v4
    - csa_compress_ratios
    - o_lora_rank
  allowed_megatron_diff:
    description: >
      Megatron must only carry generic, default-off interfaces. For DeepSeek-V4
      this is limited to extending moe_router_score_function with sqrtsoftplus
      (default behaviour for softmax/sigmoid unchanged).
    files:
      - megatron/core/transformer/moe/moe_utils.py
      - megatron/training/arguments.py

traps:
  - field: checkpoint_prefixes
    detail: >
      DeepSeek V4 Flash checkpoint uses embed/layers/head/mtp prefixes rather than HF model.* prefixes. Slicing,
      conversion, and real-weight loading must map these prefixes explicitly and must read sharded safetensors through
      model.safetensors.index.json.

  - field: partial_rotary_factor
    detail: >
      partial_rotary_factor is absent in config.json and must be computed as qk_rope_head_dim / head_dim = 0.125.
      Sliding layers use main RoPE while compressed layers use compress RoPE parameters.

  - field: mtp
    detail: >
      HF reference ignores mtp.* as unexpected during normal load, but slicing and conversion must preserve MTP tensors.
      Phase 2/3 validators should explicitly check that mtp.* keys survive the conversion path.

  - field: eager_attention
    detail: >
      Flash/SDPA/Flex attention shortcuts do not implement V4 semantics: head_dim=512, attention sinks, shared-KV value
      RoPE undo, and compressed KV block-bias behavior require eager-compatible logic.

  - field: hash_routing
    detail: >
      The first num_hash_layers MoE layers use tid2eid token-id lookup for expert indices while learned router scores
      still provide weights. Hash routing lives inside the LoongForge DeepSeek-V4 package and must NOT be reintroduced as
      a Megatron-core dispatch branch.

  - field: compressed_attention
    detail: >
      CSA/HCA compressed attention layer schedule must be preserved when slicing keeps layers; remapped layer_types and
      compress_ratios must correspond to the original kept layer indices.

  - field: hyper_connection_scales
    detail: >
      Hyper-connection scale tensors are real parameters named attn_hc.scale, ffn_hc.scale, and hc_head.hc_scale. Do not
      discard all keys ending in .scale as FP8 auxiliary scales; only skip .scale keys that pair with FP8 .weight tensors.

  - field: routed_expert_parameter_names
    detail: >
      Phase 2 semantic tensors use mlp.experts.gate_up_proj.weight and mlp.experts.down_proj.weight, while the native Omni
      eager module parameters are mlp.experts.gate_up_proj and mlp.experts.down_proj. Phase 3 loaders must strip the .weight
      suffix for these packed routed expert parameters or real-weight loss diff will fail.

  - field: fp8_block_scales
    detail: >
      Official weights may be float8_e4m3fn with 128x128 block scale tensors. Roundtrip comparison must compare raw bytes
      for float8 tensors, and Phase 3 materialization must dequantize using the paired scale tensor before BF16 forward.

  - field: attention_mask_baseline
    detail: >
      HF full forward builds a causal sliding-window mask. Component-level debugging should compare HF and Omni attention
      under the same explicit causal mask; otherwise attention appears divergent even when implementations match.

# Validation evidence is produced per-run by the migration verifier; legacy
# adaptation_run_20260601_170932 results were removed because they referenced
# artifacts that no longer exist.
validation:
  contract: deepseek-v4-migration
  verifier_script: skills/adapt/scripts/verify_deepseek_v4_migration.py
  baseline_script: /ssd3/weizhihao/code/v4_0520/sft_v4.sh
  target_script: examples/deepseek_v4/sft_v4.sh
  required_evidence:
    - reference_omni_present
    - reference_megatron_present
    - target_omni_v4_package_present
    - target_megatron_no_v4_specific_files
    - target_megatron_no_v4_specific_strings
    - random_init_smoke_passed
    - real_checkpoint_load_smoke_passed
    - same_batch_lossdiff_within_1e-3
