family: deepseek_v3
model_category: LLM

# DeepSeek V3 builds on V2 by introducing MTP (Multi-Token Prediction) auxiliary heads + improved MoE load balancing
# model_type=deepseek_v3; V3.2 is the latest variant (model_type=deepseek_v3 with sparse_attn=true)
# V2 and V3 share the same Omni implementation (foundation/deepseek/), distinguished by config fields

hf_reference:
  path: /Users/weizhihao/workspace/agent_skills/harness/hf_models/llm/DeepSeek-V3
  model_type: deepseek_v3
  hub_id: deepseek-ai/DeepSeek-V3

# Structural fingerprint (used by analyze.py fallback scoring when model_type matching fails)
structural_tags:
  has_mla: true
  has_moe: true
  has_qk_layernorm: false
  has_linear_attn: false
  has_mtp: true       # V3 has MTP (enabled when mtp_num_layers > 0)
  is_mha: false       # MLA is not MHA
  vocab_size_tier: "standard"

code_paths:
  config:     loongforge/models/foundation/deepseek/deepseek_config.py
  layer_spec: loongforge/models/foundation/deepseek/deepseek_layer_spec.py
  model:      loongforge/models/foundation/deepseek/deepseek_model.py
  init:       loongforge/models/foundation/deepseek/__init__.py
  # MTP logic is embedded in deepseek_layer_spec.py (end of get_deepseek_decoder_block_and_mtp_spec function),
  # controlled by config.mtp_num_layers switch, calls megatron.core's get_gpt_mtp_block_spec.
  # deepseek_multi_token_prediction.py does not exist; there is no standalone MTP file.

traps:
  - field: e_score_correction_bias
    detail: >
      V3 MoE gate uses noaux_tc routing strategy, including learnable weight e_score_correction_bias (shape: [n_routed_experts]).
      HF key is model.layers.{i}.mlp.gate.e_score_correction_bias,
      Omni mcore key is decoder.layers.{i}.mlp.router.e_score_correction_bias.
      If convert_yaml's name_map lacks this mapping, the weight is silently dropped during conversion,
      causing unbalanced expert load and logit shift during inference.
      Correct approach: Explicitly add gate.e_score_correction_bias mapping for each layer in deepseek_v3_convert.yaml.

  - field: mtp_num_layers
    detail: >
      mtp_num_layers default value is 0 (MTP disabled). layer_spec uses if config.mtp_num_layers is not None to check,
      so setting it to 0 still enters the MTP branch and calls get_gpt_mtp_block_spec, but no MTP layers are actually built.
      Phase 1/2 backbone verification must set mtp_num_layers to 0 to avoid weight shape conflicts;
      after enabling MTP, convert.yaml needs new mtp_layers.{j}.* prefix mappings.
      Correct approach: First pass backbone accuracy with mtp_num_layers=0, then enable MTP incrementally.

  - field: first_k_dense_replace
    detail: >
      The first 3 layers of V3 are Dense layers (HF config first_k_dense_replace=3), corresponding to the first 3 elements
      of moe_layer_freq being 0. If the HF first_k_dense_replace field is directly ignored and all layers are set to MoE,
      the first 3 layers will incorrectly use MoE layer spec (containing SharedExpertMLP + MoELayer),
      causing forward output to be inconsistent with HF reference and weight loading failure.
      Correct approach: When generating the moe_layer_freq list, force the first first_k_dense_replace elements to 0.

  - field: config_base_class
    detail: >
      Same as V2: DeepseekConfig inherits from BaseModelMLAConfig, not BaseModelConfig.
      Using BaseModelConfig incorrectly, the multi_latent_attention field does not exist,
      and layer_spec's assert config.multi_latent_attention will raise AttributeError.
      Correct approach: from loongforge.models.common.base_model_config import BaseModelMLAConfig.

  - field: moe_gate_scoring
    detail: >
      V3 MoE gate uses sigmoid (not softmax); each expert is independently activated without competition.
      If reusing V2's softmax logic, expert scores within a group are normalized,
      causing incorrect expert selection probability distribution.
      Correct approach: Confirm V3 yaml/config has moe_router_score_function=sigmoid (or corresponding Omni field),
      and do not mix with V2's softmax mode.

  - field: q_lora_rank is None but model has Q compression
    detail: >
      DeepSeek-V3's HF config has q_lora_rank present (V3 has Q latent compression).
      If manually set to None, MLASelfAttention's internal assert will fail,
      or weight loading will error due to q_a_proj shape mismatch.
      Correct approach: Read q_lora_rank value directly from HF config.json, do not manually override.

  - field: layer_spec mistakenly using SelfAttention instead of MLASelfAttention
    detail: >
      DeepSeek series must use MLASelfAttention instead of standard SelfAttention.
      Mistakenly using SelfAttention may not trigger linter errors, but forward computation KV cache shape will not match,
      and loss will differ significantly from HF reference (typically > 10x).
      Correct approach: Confirm the self_attention submodule type in layer_spec is MLASelfAttention.

omni_reference:
  model_yaml:     configs/models/deepseek3/deepseek_v3.yaml
  convert_yaml:   configs/models/deepseek3/ckpt_convert/deepseek_v3_convert.yaml
  example_script: examples/deepseek_v3/pretrain/pretrain_deepseek_v3_group_bf16.sh
