# Schema template for phases/phase0/bridge_mapping.yaml. Absorbs reference_contract.yml (per D-05).
#
# This file documents the structure of the bridge_mapping.yaml output artifact
# produced by Phase 0 Step 5.5 (deterministic bridge step, per D-19).
# All fields are mirrored from the BridgeMapping Pydantic v2 model in
# skills/adapt/lib/schema.py.
#
# The bridge_mapping is the core Phase 0 deliverable that downstream phases
# (1-5) consume. It provides component-by-component mapping from HF to
# Megatron, including weight maps, behavioral differences, and gap entries.

model: <model_name>                     # REQUIRED — e.g. "DeepSeek-V3"
hf_source: <modeling_file_path>         # REQUIRED — e.g. "transformers/models/deepseek_v3"
megatron_family: <family_name>           # REQUIRED — e.g. "deepseek_v3"

# --- Component bridge (per D-16) ------------------------------------------
# Each entry maps an HF component to its Megatron counterpart(s) or marks it
# as a gap. Entries are generated by the deterministic bridge step (D-19).

component_bridge:
  # (a) Example: attention component where Megatron has MLASelfAttention
  #     — weight_map populated, strategy=adapt_ref
  - hf: attention                       # REQUIRED — HF component key
    megatron:                           # Megatron class/module references; None for gaps (per D-09)
      - MLASelfAttention
    strategy: adapt_ref                 # REQUIRED — reuse_ref | adapt_ref | new_impl
    confidence: medium                  # REQUIRED — high | medium | low
                                        # (same→high, differs→medium, new_component→low per D-19)
    weight_map:                         # Only when Megatron module exists (per D-09)
      - hf: self_attn.q_a_proj.weight  # REQUIRED — HF parameter name
        megatron: linear_q_proj.weight  # REQUIRED — Megatron parameter name
        shape_hint: "1536x4096"         # Shape hints (per D-11)
        reshape_required: ""            # Any reshape/transposition needed (per D-11)
      - hf: self_attn.kv_a_proj_with_k_norm.weight
        megatron: linear_kv_proj.weight
        shape_hint: "512x7168"
        reshape_required: ""

    behavioral_diff:                    # Behavioral differences for this component
      - topic: q_lora_rank              # REQUIRED
        hf: "q_lora_rank: 1536"        # REQUIRED — HF behavior
        megatron: "q_lora_rank: absent" # REQUIRED — Megatron behavior
        impact: high                    # REQUIRED — critical | high | medium
        strategy: "adapt_ref with param addition"  # Guidance for Phase 1

    delta:                              # Structural differences (inherited from model_spec delta)
      - "q_lora_rank: 1536 (new) -> absent (candidate lacks)"

  # (b) Example: gap component where Megatron lacks a module
  #     — weight_map: null, gap entry with impact=critical
  - hf: mtp                            # REQUIRED
    megatron: null                      # null means no Megatron counterpart (per D-09)
    strategy: new_impl                 # REQUIRED
    confidence: low                      # REQUIRED
    weight_map: null                    # null when Megatron module doesn't exist (per D-10)
    behavioral_diff: []                 # No behavioral diff when no Megatron counterpart
    delta: []                           # No structural differences recorded

# --- Gap entries (per D-07) ----------------------------------------------
# Components that do NOT exist in Megatron are recorded here with impact level
# and Phase 1 guidance. Phase 0 does NOT design implementations (per D-08).

gaps:
  - id: G1                              # REQUIRED — gap identifier (G1, G2, ...)
    component: mtp                      # REQUIRED — component name
    hf: DeepseekV3MTP                   # REQUIRED — HF class name
    megatron: NEW                       # REQUIRED — what exists or "NEW" (per D-07)
    decision: "New implementation required in LoongForge model-specific code"  # REQUIRED
    impact: critical                    # REQUIRED — critical | high | medium
    phase1_guidance: "Implement multi-token prediction module; check Megatron issue #4468 for reference"  # REQUIRED

  # Example: partial gap where Megatron has base class but not specialization
  # - id: G2
  #   component: moe_gate
  #   hf: MoEGate
  #   megatron: "Router (missing hash/expert-bias extensions)"
  #   decision: "Extend existing Megatron Router with model-specific routing logic"
  #   impact: high
  #   phase1_guidance: "Add hash routing and expert bias to Router; preserve sigmoid/noaux_tc base"

# --- Validator requirements (per D-16) ------------------------------------
# Phase 0 declares what downstream phases need to verify.

validator_requirements:
  - "phase1-verify: confirm forward alignment with MLA attention"
  - "phase2-conversion: verify weight mapping for q_a_proj -> linear_q_proj"
  - "loss-diff: verify routing bias does not cause numerical regression"

# --- Absorbed from reference_contract.yml (per D-05) ----------------------
# These fields were previously in reference_contract.yml and are now
# incorporated directly into bridge_mapping.yaml.

implementation_contract: null            # Optional — per D-05
# Example:
#   required_integration_level: framework_extension
#   allow_standalone_fallback: false
#   allow_shared_framework_changes: true
#   required_components: []
#   forbidden_final_patterns: []

conversion_requirements: null            # Optional — per D-05
# Example:
#   target_checkpoint_format: mcore
#   must_emit_target_checkpoint: true
#   must_load_in_target_framework: true
#   forbidden_shortcuts: []

phase3_reference_requirements: null      # Optional — per D-05
# Example:
#   allowed_reference_types: [hf, megatron, standalone]
#   custom_reference_loader_required: false

# --- Migrated references (per D-05) --------------------------------------
# Reference entries previously in reference_contract.yml references[] section.

references: []
