# Schema template for phases/phase0/hf_analysis.yaml. Supersedes model_spec.yaml (per D-04).
#
# This file documents the structure of the hf_analysis.yaml output artifact
# produced by Phase 0. All fields are mirrored from the HfAnalysis Pydantic v2
# model in skills/adapt/lib/schema.py.
#
# Every field from the current model_spec_llm.yaml example has a home in this
# schema. The `weight_structure` section is appended by Phase 0 Step 4 (same
# as the current model_spec.yaml Step 4).

model_category: llm | vlm | diffusion  # REQUIRED

candidate_family: <family_name>         # REQUIRED — e.g. "deepseek_v3", "qwen3"

hf_reference_path: <path-or-url>       # REQUIRED — path to HF candidate reference

candidate_match_reason: <reason>        # REQUIRED — why this candidate was chosen

has_chat_template: false                # Whether the model has a chat template

# --- Low-confidence candidate (per D-12) ----------------------------------
# When KB has no entry for the target model, Phase 0 selects the closest
# candidate and marks it as low-confidence.

low_confidence_candidate: null          # true when candidate match is uncertain
low_confidence_reason: null             # Why confidence is low

# --- Component analysis (maps from model_spec components) -----------------
# Each key is a component name (e.g. "embedding", "attention", "moe_gate").
# The component dict preserves all fields from current model_spec_llm.yaml.

components:
  <component_name>:
    diff: same | differs | new_component | absent_in_hf   # REQUIRED
    strategy: reuse_ref | adapt_ref | new_impl             # REQUIRED
    delta: []                  # List of structural differences (from current model_spec)
    note: null                 # Optional free-text note
    hf_class: <class_name>    # HF class implementing this component
    hf_file: <file_name>      # Source file containing this component
    hf_line: <line_number>    # Line number of class definition
    structural_tags: []       # Feature tags for matching/reference
    same_class_as: null        # When same class used for another component

