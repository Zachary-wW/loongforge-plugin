#    delta:
#      - "q_lora_rank: 1536 (new) -> absent (candidate lacks)"
#      - "v_head_dim: 128 (new) -> 96 (candidate)"
#    hf_class: DeepseekV3Attention
#    hf_file: modeling_deepseek.py
#    hf_line: 630
#    structural_tags: [mla, q_lora_rank=1536, kv_lora_rank=512,
#                      qk_nope_head_dim=128, qk_rope_head_dim=64,
#                      v_head_dim=128, decoupled_rope]

# --- Novel modules (modules not present in candidate) ---------------------
novel_modules:
  - hf_class: <class_name>     # REQUIRED
    hf_file: <file_name>
    hf_line: <line_number>
    desc: <description>         # REQUIRED
    external_dependency: false  # Whether this module depends on external code
    sub_modules: []             # Sub-modules within this module
    key_params: []              # Key parameters for this module

# --- FP32 modules (per D-01 new section) ---------------------------------
fp32_modules:
  strict_fp32: []     # Modules that must run in FP32 (e.g. ["lm_head"])
  non_strict_fp32: [] # Modules that may run in FP32 but are not required

# --- Additional new sections (per D-01) ----------------------------------
generation_constraints: []        # Generation-time constraints (e.g. "no beam search")
config_precision_delta: []        # Config field precision differences

# --- Behavior modifications (mandatory when config fields change computation) ---
behavior_modifications:
  - id: <BM1>                    # REQUIRED — unique identifier
    component: <component_name>  # REQUIRED
    behavior_type: <type>        # REQUIRED — e.g. "routing_bias", "activation_clamp"
    source_evidence:             # REQUIRED
      hf_file: <file_name>
      hf_line: <line_number>
      config_fields: []          # Config fields driving this behavior
    required_behavior: <description>  # REQUIRED — what must happen
    affected_existing_modules: []      # Modules affected by this modification
    validation_hint: ""                # How to verify this behavior

# --- Traps and pitfalls ---------------------------------------------------
traps:
  - "Description of a trap or pitfall for downstream phases"

# --- Special features (optional, model-specific) --------------------------
special_features: null             # Dict of model-specific features
                                 # e.g. {routing_bias: {hf_key: ..., desc: ...}}

# --- Weight structure (appended by Phase 0 Step 4) -----------------------
# This section is added after the HF analysis is complete. It groups weights
# by component prefix and provides naming patterns and index ranges.
# Same as current model_spec.yaml Step 4 behavior.
weight_structure:
  total_keys: 0
  components:
    <component_name>:
      key_count: 0
      sample_keys: []
      naming_pattern: ""
      index_range: ""
