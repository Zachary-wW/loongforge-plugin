# Expected perf findings for the DeepSeek-V4 attention witness.
#
# Anchored to:
#   commit       : b962a1b99319de613c0cf180721af377bd23778c
#   file         : loongforge/models/foundation/deepseek_v4/deepseek_v4_attention.py
#   file_sha256  : 25439eec0cb3bc8e34163e87f5122b9c0a5197d0aae02ed8e4eb25653f51b68d
#   line_count   : 1048
#
# The reviewer / probe pipeline is correct iff:
#   - every "must" finding below appears in the reviewer report at the listed
#     severity (or stricter), with a line range overlapping the listed anchor;
#   - no "forbidden" check below trips on a corpus-known-good model.
#
# Severity ladder:    INFO < WARN < FAIL
# Status ladder:      draft < warn-only < enforced
# A finding's status here is the MINIMUM the reviewer must reach by the end of
# the named batch. Reviewer may exceed it (e.g. early-promote to enforced), but
# never under-deliver.

version: 1

baseline:
  branch: ai_v4
  commit: b962a1b99319de613c0cf180721af377bd23778c
  file: loongforge/models/foundation/deepseek_v4/deepseek_v4_attention.py
  file_sha256: 25439eec0cb3bc8e34163e87f5122b9c0a5197d0aae02ed8e4eb25653f51b68d
  line_count: 1048

# -----------------------------------------------------------------------------
# Category A — Large tensors that should be chunked / not materialised
# -----------------------------------------------------------------------------

static_findings:

  - id: A1_indexer_logits_full_materialise
    rule: P011
    severity: FAIL
    must_be_caught_by_batch: 2
    anchor:
      lines: [442, 443]
      pattern: "torch.einsum('bqhd,bsd->bqhs'"
    what: |
      Indexer scoring materialises the full [b, sq, n_heads, n_chunks] logits
      tensor in fp32 inside hot path. At seq=4096, n_heads=64, n_chunks=1024
      this is ~4 GB per layer per forward.
    fix_direction: |
      Use chunked / fused indexer kernel; or accumulate score directly via
      einsum 'bqhd,bsd,sbh->bqs' with reduction over h to skip the per-head
      intermediate.
    needs_dynamic_corroboration_for_enforced: true

  - id: A2_dense_topk_mask
    rule: P011
    severity: FAIL
    must_be_caught_by_batch: 2
    anchor:
      lines: [836, 849]
      pattern: "comp_mask_dense"
    what: |
      Top-k indexer output is converted to a dense [batch, seq_len, n_comp]
      bool mask, then concatenated and broadcast to a [b, h, sq, skv]
      additive mask. Defeats the whole point of sparse selection.
    fix_direction: |
      Pass topk indices directly to a sparse-attention kernel, or gather
      the selected K/V columns into [batch, sq, topk, head_dim] and run a
      dense SDPA over that compact shape (skv = topk, not n_comp).

  - id: A3_full_size_additive_sdpa_mask
    rule: P012
    severity: FAIL
    must_be_caught_by_batch: 2
    anchor:
      lines: [905, 947]
      pattern: "sdpa_mask = torch.zeros"
    what: |
      An [b, h, sq, skv] additive mask is allocated in the activation dtype
      and filled with -inf / sink bias. For large skv this dominates
      attention-layer activation memory.
    fix_direction: |
      Use SDPA's is_causal + key_padding_mask interface, or build the mask
      at [1, 1, sq, skv] and let SDPA broadcast; pass attn_sink as a per-head
      scalar bias rather than as a column of the mask.

  - id: A4_kv_expand_contiguous
    rule: P011
    severity: FAIL
    must_be_caught_by_batch: 2
    anchor:
      lines: [888, 889]
      pattern: ".expand(-1, -1, local_num_heads, -1).contiguous()"
    what: |
      KV is single-head; .expand(...).contiguous() materialises a per-head
      copy, multiplying KV memory by local_num_heads (=64 on V4 single-GPU).
    fix_direction: |
      Use torch.nn.functional.scaled_dot_product_attention(..., enable_gqa=True)
      with the broadcasted view, or rely on the GQA path of the chosen
      attention backend.

  - id: A5_value_clone_of_key
    rule: P005
    severity: FAIL
    must_be_caught_by_batch: 2
    anchor:
      lines: [856, 868]
      pattern: "value = key.clone()"
    what: |
      V4 unifies V==K, but the code clones K to produce V, doubling KV
      activation memory.
    fix_direction: |
      Pass the same tensor as both K and V to SDPA. If the backend requires
      distinct tensors, use a stride-0 view, not .clone().

  - id: A6_attention_sink_via_zero_kv_column
    rule: P012
    severity: FAIL
    must_be_caught_by_batch: 2
    anchor:
      lines: [895, 898]
      pattern: "torch.cat([k_sdpa, sink_k], dim=2)"
    what: |
      Attention sink is implemented by appending a zero-valued KV column,
      forcing K and V tensors to be re-allocated/copied at every forward.
      Should be a per-head bias added to attention logits.
    fix_direction: |
      Add attn_sink as an additive scalar bias on the softmax denominator
      (Megatron's TEDotProductAttention exposes attn_sink/sink-token APIs);
      do not extend the KV sequence.

  - id: A7_overlap_transform_buffer
    rule: P007
    severity: WARN
    must_be_caught_by_batch: 2
    anchor:
      lines: [241, 246]
      pattern: "tensor.new_full"
    what: |
      `_overlap_transform` allocates a fresh buffer per forward sized
      [n_chunks, 2*ratio, batch, kv_dim].
    fix_direction: |
      Pre-allocate or use roll/cat-on-pre-shifted views; or fold the overlap
      into the wkv/wgate projection by widening output dim once at init.

# -----------------------------------------------------------------------------
# Category B — Redundant ops / nested loops / weight gymnastics
# -----------------------------------------------------------------------------

  - id: B1_nested_python_loop_for_sparse_mask
    rule: P004
    severity: FAIL
    must_be_caught_by_batch: 2
    anchor:
      lines: [837, 844]
      pattern: "for b_idx in range(batch)"
    what: |
      Two nested Python `for` loops (over batch and seq_len) drive a
      tensor scatter inside the attention forward. With 43 layers × 4096
      seq, this is hundreds of thousands of Python iterations per step.
    fix_direction: |
      Vectorise: build a [batch, sq, n_comp] mask via scatter_ on flattened
      indices in one call; or skip the dense mask entirely (see A2).

  - id: B2_triple_permute_contiguous
    rule: P006
    severity: WARN
    must_be_caught_by_batch: 2
    anchor:
      lines: [891, 893]
      pattern: ".permute("
    what: |
      Q/K/V each go through .permute(...).contiguous() before SDPA;
      additionally K then receives an .expand(...).contiguous() (A4).
    fix_direction: |
      Use a single layout transform; if SDPA can take sbhd directly via
      the chosen backend, skip the permute/contiguous entirely.

  - id: B3_dequantize_in_forward
    rule: P013
    severity: FAIL
    must_be_caught_by_batch: 2
    anchor:
      line: 988
      pattern: ".dequantize()"
    what: |
      `wo_a_weight.dequantize()` is called in every forward. This nullifies
      FP8 storage savings AND skips the FP8 GEMM, performing the matmul in
      bf16/fp32 — strictly worse than not enabling FP8.
    fix_direction: |
      Replace the einsum-on-.weight grouped projection with a wrap_megatron
      ColumnParallelLinear that natively supports FP8 (see B5/C5). The
      explicit dequantize must not appear in any hot path.

  - id: B4_weight_dtype_cast_in_forward
    rule: P006
    severity: WARN
    must_be_caught_by_batch: 2
    anchor:
      line: 991
      pattern: "wo_a_weight.to(attn_output.dtype)"
    what: |
      Weight dtype cast occurs in every forward. Should be done once at
      init or rely on autocast.

  - id: B5_einsum_bypasses_te_gemm
    rule: P014
    severity: FAIL
    must_be_caught_by_batch: 2
    anchor:
      lines: [996, 999]
      pattern: "torch.einsum"
    what: |
      `torch.einsum("...gd,grd->...gr", o_grouped, wo_a_w)` reads
      linear_wo_a.weight directly, bypassing TransformerEngine's
      ColumnParallelLinear GEMM (loses FP8, autocast, gradient bucketing,
      and TP-aware comm overlap).
    fix_direction: |
      Express grouped output projection as a Megatron-native module:
      either (a) reshape and call ColumnParallelLinear directly with
      grouped input layout, or (b) wrap_megatron with a GroupedLinear
      subclass. Recipe: parallel_recipes/grouped_output_projection.md.

  - id: B6_rope_freqs_recomputed_each_forward
    rule: P015
    severity: WARN
    must_be_caught_by_batch: 2
    anchors:
      - lines: [292, 300]
        pattern: "torch.outer(positions, self.compress_inv_freq)"
      - lines: [403, 406]
        pattern: "torch.outer(q_positions, self.compress_inv_freq)"
      - lines: [759, 764]
        pattern: "torch.outer(positions, inv_freq)"
    what: |
      `arange + outer + cos/sin` computed three times per forward across
      Compressor / Indexer / Attention. With multi_latent_attention,
      Megatron's RotaryEmbedding could own this in a layer-shared buffer.
    fix_direction: |
      Build a model-owned RotaryEmbedding (compress / main variants) once
      at init; cache cos/sin up to max_seq_len; index by position.
      Recipe: parallel_recipes/rope_buffers.md.

  - id: B7_repeat_interleave_in_apply_rotary
    rule: P006
    severity: INFO
    must_be_caught_by_batch: 3
    anchor:
      lines: [1031, 1032]
      pattern: "cos.repeat_interleave"
    what: |
      Half-sized cos/sin are repeat_interleaved in every _apply_rotary call.
      Should happen once at buffer construction.

  - id: B8_iq_iw_dtype_pingpong
    rule: P006
    severity: WARN
    must_be_caught_by_batch: 2
    anchor:
      lines: [434, 442]
      pattern: ".to(torch.bfloat16).contiguous()"
    what: |
      Indexer Q/K/W are cast to bf16 + .contiguous(), then immediately
      cast to .float() inside the einsum. Net effect: extra bf16 round-trip.

  - id: B9_iw_extra_layout_change
    rule: P006
    severity: INFO
    must_be_caught_by_batch: 3
    anchor:
      line: 443
      pattern: "iw_b.permute(1, 0, 2).unsqueeze(-1).float()"

# -----------------------------------------------------------------------------
# Category C — Parallelism: every site that should not be writing TP-aware
# code by hand. These are NOT static-rule findings; they belong to the
# parallel_support / parallel_plan / parallel-implementer track.
# -----------------------------------------------------------------------------

parallel_findings:

  - id: C1_compressor_duplicated_linears
    severity: FAIL
    must_be_caught_by_batch: 4
    anchor:
      lines: [194, 215]
      pattern: "parallel_mode='duplicated'"
    what: |
      Compressor.linear_wkv / linear_wgate use parallel_mode='duplicated';
      every TP rank holds full weights. Wastes memory + compute.
    expected_recipe: parallel_recipes/tp_for_sparse_attention.md
    expected_strategy: "ColumnParallel(gather_output=False) + SP-aware norm"

  - id: C2_indexer_duplicated_linears
    severity: FAIL
    must_be_caught_by_batch: 4
    anchor:
      lines: [333, 356]
      pattern: "parallel_mode='duplicated'"
    expected_recipe: parallel_recipes/tp_for_sparse_attention.md

  - id: C3_kv_proj_duplicated
    severity: FAIL
    must_be_caught_by_batch: 4
    anchor:
      lines: [554, 564]
      pattern: "parallel_mode='duplicated'"
    expected_recipe: parallel_recipes/tp_for_mla.md

  - id: C4_inline_tp_retrofit_in_forward
    severity: FAIL
    must_be_caught_by_batch: 4
    anchors:
      - lines: [394, 397]
      - lines: [692, 710]
      - lines: [1005, 1007]
    pattern_any:
      - "gather_from_tensor_model_parallel_region"
      - "scatter_to_sequence_parallel_region"
      - "gather_from_sequence_parallel_region"
    what: |
      forward() imports gather_/scatter_* primitives at call sites in three
      different places. This is the "TP not planned, retrofitted" antipattern.
      A correct parallel_plan + recipe-driven implementation would never
      touch tensor_parallel.mappings inside attention forward.
    forbidden_after_batch: 4
    grep_must_be_zero_in_files:
      - loongforge/models/foundation/deepseek_v4/deepseek_v4_attention.py
      - loongforge/models/foundation/deepseek_v4/deepseek_v4_model.py
      - loongforge/models/foundation/deepseek_v4/deepseek_v4_layer_spec.py
    grep_patterns:
      - "from megatron.core.tensor_parallel.mappings import gather_"
      - "from megatron.core.tensor_parallel.mappings import scatter_"

  - id: C5_manual_tp_slicing_for_sink_and_grouped_proj
    severity: FAIL
    must_be_caught_by_batch: 4
    anchors:
      - lines: [901, 902]
        pattern: "tp_rank * local_num_heads"
      - lines: [979, 985]
        pattern: "local_grouped_intermediate // local_o_lora_rank"
    expected_recipe: parallel_recipes/grouped_output_projection.md

# -----------------------------------------------------------------------------
# Dynamic probe expectations (Step 7c). Activated in batch 3.
# -----------------------------------------------------------------------------

dynamic_probe:
  must_be_active_by_batch: 3
  trim_policy:
    num_layers: 2
    seq_len: from_model_spec        # real seq, e.g. 4096 for V4
    n_chunks: derived_from_seq      # seq_len // compress_ratio
    micro_batch_size: 1

  top_tensors_must_include:
    # Each entry: any top-K tensor whose name matches `name_regex` and whose
    # measured size >= min_mb passes. Reviewer fails the witness if no
    # qualifying tensor is reported for a listed slot.
    - slot: indexer_logits
      name_regex: "(einsum|indexer).*(logits|scores|out)"
      min_mb: 2000
      ties_to_finding: A1_indexer_logits_full_materialise

    - slot: sdpa_mask
      name_regex: "sdpa_mask|attn_mask"
      min_mb: 500
      ties_to_finding: A3_full_size_additive_sdpa_mask

    - slot: kv_per_head_copy
      name_regex: "key|value"
      min_mb: 500
      ties_to_finding: A4_kv_expand_contiguous

  peak_memory_relative_to_baseline:
    # After fixes (post-batch-4), re-run probe on the patched attention file;
    # peak should drop substantially.
    sparse_mla_layers_max: 0.6   # ≤60% of frozen baseline peak

# -----------------------------------------------------------------------------
# Cross-checks against false positives.
# -----------------------------------------------------------------------------

corpus_must_not_trip:
  # When perf-reviewer runs on these known-good files in the corpus, it must
  # NOT raise FAIL on the rules below. Used to catch overfitting to V4.
  # Files chosen from in-tree models that have already passed Phase 3 / are
  # in production. Re-resolve when the corpus drifts.
  - file: loongforge/models/foundation/qwen3_next/gated_attention.py
    rules: [P004, P005, P011, P012, P013, P014, P015]
    max_severity_allowed: WARN
  - file: loongforge/models/foundation/minimax/attention.py
    rules: [P004, P005, P011, P012, P013, P014, P015]
    max_severity_allowed: WARN
